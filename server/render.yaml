# Deploy JSON Server to Render (free tier)
# 1. Create a new Web Service on https://render.com
# 2. Connect this repo and set root directory to project root
# 3. Build: npm install
# 4. Start: npx json-server --watch db.json --port $PORT --host 0.0.0.0
# 5. Set VITE_API_URL in Vercel/Netlify to: https://YOUR-SERVICE.onrender.com/books

services:
  - type: web
    name: bookvault-api
    env: node
    buildCommand: npm install
    startCommand: npx json-server --watch db.json --port $PORT --host 0.0.0.0
    envVars:
      - key: NODE_VERSION
        value: 20
